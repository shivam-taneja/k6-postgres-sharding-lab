services:
  db-monolith:
    container_name: sharding-demo-monolith
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5430:5432"
    volumes:
      - monolith_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.1'

  db-shard-1:
    container_name: sharding-demo-shard-1
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5431:5432"
    volumes:
      - shard1_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.1'

  db-shard-2:
    container_name: sharding-demo-shard-2
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - shard2_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.1'

volumes:
  monolith_data:
    name: sharding-demo-monolith-data
  shard1_data:
    name: sharding-demo-shard1-data
  shard2_data:
    name: sharding-demo-shard2-data
