services:
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    depends_on:
      - influxdb

  k6:
    image: grafana/k6:latest
    volumes:
      - ./load-test:/scripts

  db-monolith:
    container_name: sharding-demo-monolith
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5430:5432"
    volumes:
      - monolith_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.1'

  db-shard-1:
    container_name: sharding-demo-shard-1
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5431:5432"
    volumes:
      - shard1_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.1'

  db-shard-2:
    container_name: sharding-demo-shard-2
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - shard2_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.1'

volumes:
  monolith_data:
    name: sharding-demo-monolith-data
  shard1_data:
    name: sharding-demo-shard1-data
  shard2_data:
    name: sharding-demo-shard2-data
